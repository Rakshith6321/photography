<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Photography Brand</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #111;
    background: #fff;
}

/* Instagram Icon */
.insta-icon {
    position: fixed;
    top: 80px;
    left: 20px;
    width: 45px;
    height: 45px;
    z-index: 1000;
    transition: 0.3s ease;
}

.insta-icon img {
    width: 100%;
    height: auto;
    display: block;
}

.insta-icon:hover {
    transform: scale(1.2);
}

header {
    background: #000;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    color: #fff;
    margin: 0;
}

nav a {
    color: #fff;
    text-decoration: none;
    margin-left: 20px;
}

.hero {
    width: 100%;
    height: 60vh;
    background-image: url("web.jpeg");
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

.hero h2 {
    background: rgba(0,0,0,0.5);
    padding: 15px 30px;
}

.section {
    padding: 60px 8%;
}

.gallery {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
}

.gallery img {
    width: 300px;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- Instagram Icon -->
<a href="https://instagram.com/rakshith6321" target="_blank" class="insta-icon">
    <img src="instagram.png" alt="Instagram">
</a>

<header>
    <h1>Your Name Photography</h1>
    <nav>
        <a href="#portfolio">Portfolio</a>
    </nav>
</header>

<div class="hero">
    <h2>Timeless Wedding & Portrait Photography</h2>
</div>

<section id="portfolio" class="section">
    <h2 style="text-align:center;">Featured Work</h2>
    <div class="gallery">
        <img src="image1.jpeg">
        <img src="image2.jpg">
        <img src="image3.jpg">
    </div>
</section>

</body>
</html>
